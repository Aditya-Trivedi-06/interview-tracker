<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revision Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #bb86fc;
            --text: #e0e0e0;
            --text-dim: #9e9e9e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        h1 { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .company-filter {
            padding: 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .company-filter::-webkit-scrollbar { display: none; }
        
        .chip {
            padding: 8px 16px;
            background: var(--card);
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-dim);
        }
        .chip.active {
            background: var(--accent);
            color: #000;
            font-weight: 600;
            border-color: var(--accent);
        }

        .cards-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
        }

        .rev-card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            scroll-snap-align: start;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 800;
            padding: 4px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            color: var(--accent);
        }

        .freq { font-size: 0.75rem; color: var(--text-dim); }

        .title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
        .question { font-size: 0.95rem; line-height: 1.6; color: var(--text-dim); margin-bottom: 20px; }

        .reveal-section {
            margin-top: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
        }

        .reveal-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .reveal-content {
            filter: blur(8px);
            transition: filter 0.3s;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .reveal-section.active .reveal-content {
            filter: blur(0);
        }

        .reveal-section.topic .reveal-content { filter: none; display: none; }
        .reveal-section.topic.active .reveal-content { display: block; }

        .solved-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-weight: 600;
            transition: all 0.2s;
        }
        .solved-btn.active {
            background: #4caf50;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <header>
        <h1>⚡ REVISION</h1>
        <div id="stats" style="font-size: 0.8rem; color: var(--accent)">0/307</div>
    </header>

    <div class="company-filter" id="filter">
        <div class="chip active" data-comp="all">All</div>
        <div class="chip" data-comp="Google">Google</div>
        <div class="chip" data-comp="Amazon">Amazon</div>
        <div class="chip" data-comp="Microsoft">Microsoft</div>
        <div class="chip" data-comp="Apple">Apple</div>
    </div>

    <div class="cards-container" id="container"></div>

    <script src="data_revision.js"></script>
    <script>
        let currentFilter = 'all';
        let state = JSON.parse(localStorage.getItem('prepState')) || { solved: {} };

        function render() {
            const container = document.getElementById('container');
            const filtered = currentFilter === 'all' 
                ? REVISION_CARDS 
                : REVISION_CARDS.filter(c => c.c === currentFilter);

            container.innerHTML = filtered.map((c, i) => `
                <div class="rev-card">
                    <div class="card-header">
                        <span class="badge">${c.c}</span>
                        <span class="freq">Freq: ${c.f}%</span>
                    </div>
                    <div class="title">${c.t}</div>
                    <div class="question">${c.q || 'Problem description loading...'}</div>
                    
                    <div class="reveal-section topic" onclick="this.classList.toggle('active')">
                        <div class="reveal-label">REVEAL TOPIC <span>▼</span></div>
                        <div class="reveal-content">${c.tp || 'Arrays, Strings'}</div>
                    </div>

                    <div class="reveal-section" onclick="this.classList.toggle('active')">
                        <div class="reveal-label">OPTIMAL APPROACH <span>TAP TO REVEAL</span></div>
                        <div class="reveal-content">${c.optimal || 'No data yet.'}</div>
                    </div>

                    <div class="reveal-section" onclick="this.classList.toggle('active')">
                        <div class="reveal-label">FOLLOW-UP <span>TAP TO REVEAL</span></div>
                        <div class="reveal-content">${c.followup || 'No data yet.'}</div>
                    </div>

                    <button class="solved-btn ${state.solved[c.t] === 'solved' ? 'active' : ''}" 
                            onclick="toggleSolved('${c.t}', this)">
                        ${state.solved[c.t] === 'solved' ? '✓ SOLVED' : 'MARK AS SOLVED'}
                    </button>
                </div>
            `).join('');

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">No cards for this company.</div>';
            }

            const solvedCount = REVISION_CARDS.filter(c => state.solved[c.t] === 'solved').length;
            document.getElementById('stats').textContent = `${solvedCount}/${REVISION_CARDS.length}`;
        }

        function toggleSolved(title, btn) {
            if (state.solved[title] === 'solved') {
                delete state.solved[title];
                btn.classList.remove('active');
                btn.textContent = 'MARK AS SOLVED';
            } else {
                state.solved[title] = 'solved';
                btn.classList.add('active');
                btn.textContent = '✓ SOLVED';
            }
            localStorage.setItem('prepState', JSON.stringify(state));
            const solvedCount = REVISION_CARDS.filter(c => state.solved[c.t] === 'solved').length;
            document.getElementById('stats').textContent = `${solvedCount}/${REVISION_CARDS.length}`;
        }

        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentFilter = chip.dataset.comp;
                render();
            });
        });

        render();
    </script>
</body>
</html>
