<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Revision Deck</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --accent: #bb86fc;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --header-h: 60px;
            --controls-h: 50px;
            --sidebar-w: 280px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-w);
            background: #0a0a0a;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed;
            left: 0; top: 0; bottom: 0;
            z-index: 1001;
            transform: translateX(-100%);
        }
        .sidebar.active { transform: translateX(0); }

        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            width: 100%;
            font-size: 0.95rem;
        }

        .problem-list { flex: 1; overflow-y: auto; padding: 10px; }
        .problem-item {
            padding: 14px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            color: var(--text-dim);
            cursor: pointer;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .problem-item.active { background: rgba(187, 134, 252, 0.15); color: var(--accent); font-weight: 600; }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; }

        header {
            height: var(--header-h);
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .menu-btn { background: none; border: none; color: white; font-size: 1.5rem; padding: 0; cursor: pointer; }
        h1 { margin: 0; font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; }

        .progress-bar {
            position: absolute;
            top: var(--header-h);
            left: 0; width: 100%; height: 3px;
            background: rgba(255,255,255,0.1);
            z-index: 101;
        }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; width: 0%; }

        .controls {
            height: var(--controls-h);
            padding: 0 15px;
            background: #000;
            display: flex;
            gap: 10px;
            align-items: center;
            overflow-x: auto;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .controls::-webkit-scrollbar { display: none; }
        select {
            background: #111;
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
        }

        /* CARD SNAPPING CONTAINER */
        .cards-container {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .rev-card {
            height: calc(100vh - var(--header-h) - var(--controls-h));
            width: 100%;
            scroll-snap-align: start;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            background: linear-gradient(180deg, #000 0%, #111 100%);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .card-inner {
            max-height: 100%;
            overflow-y: auto;
            padding-right: 5px;
        }
        .card-inner::-webkit-scrollbar { width: 4px; }
        .card-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .badge-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .badge {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 800;
            padding: 5px 12px;
            background: rgba(187, 134, 252, 0.15);
            border-radius: 8px;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        .badge.diff { background: rgba(255,255,255,0.1); color: #fff; }

        .title { font-size: 1.6rem; font-weight: 800; margin-bottom: 12px; line-height: 1.2; }
        .question { font-size: 1rem; line-height: 1.6; color: var(--text-dim); margin-bottom: 30px; }

        .reveal-section {
            margin-top: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .reveal-section.active { background: rgba(255,255,255,0.06); border-color: rgba(187, 134, 252, 0.3); }

        .reveal-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 10px;
            letter-spacing: 1.5px;
            display: flex;
            justify-content: space-between;
        }

        .reveal-content {
            filter: blur(15px);
            transition: filter 0.4s;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .reveal-section.active .reveal-content { filter: blur(0); }
        .reveal-section.topic .reveal-content { filter: none; display: none; }
        .reveal-section.topic.active .reveal-content { display: block; }

        .solved-btn {
            margin-top: 30px;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: var(--text);
            font-weight: 800;
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .solved-btn.active { background: #4caf50; color: white; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3); }

        /* OVERLAY */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: none;
            backdrop-filter: blur(8px);
        }
        .overlay.active { display: block; }

        .empty-state { text-align: center; padding: 100px 20px; color: var(--text-dim); }

        .scroll-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--text-dim);
            opacity: 0.5;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
            60% {transform: translateY(-5px) translateX(-50%);}
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <input type="text" class="search-box" id="search" placeholder="Search problems...">
        </div>
        <div class="problem-list" id="problemList"></div>
    </aside>

    <div class="main">
        <header>
            <button class="menu-btn" id="menuToggle">☰</button>
            <h1>Revision Deck</h1>
            <div id="stats" style="font-size: 0.8rem; font-weight: 800; color: var(--accent)">0/307</div>
        </header>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="controls">
            <select id="compFilter">
                <option value="all">Companies</option>
                <option value="Google">Google</option>
                <option value="Amazon">Amazon</option>
                <option value="Microsoft">Microsoft</option>
                <option value="Apple">Apple</option>
            </select>
            <select id="sortOrder">
                <option value="default">Default</option>
                <option value="freq">By Frequency</option>
                <option value="alpha">A-Z</option>
            </select>
        </div>

        <div class="cards-container" id="container"></div>
    </div>

    <script src="data_revision.js"></script>
    <script>
        let state = JSON.parse(localStorage.getItem('prepState')) || { solved: {} };
        let currentFilter = 'all';
        let currentSort = 'default';
        let searchQuery = '';

        const container = document.getElementById('container');
        const problemList = document.getElementById('problemList');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const progressFill = document.getElementById('progressFill');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        document.getElementById('menuToggle').onclick = toggleSidebar;
        overlay.onclick = toggleSidebar;

        function render() {
            let filtered = REVISION_CARDS;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(c => c.c === currentFilter);
            }
            
            if (searchQuery) {
                filtered = filtered.filter(c => c.t.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            if (currentSort === 'freq') {
                filtered.sort((a,b) => b.f - a.f);
            } else if (currentSort === 'alpha') {
                filtered.sort((a,b) => a.t.localeCompare(b.t));
            }

            // Render Sidebar List
            problemList.innerHTML = filtered.map(c => `
                <div class="problem-item" onclick="jumpTo('${c.t}')">${c.t}</div>
            `).join('');

            // Render Full-Screen Cards
            container.innerHTML = filtered.map((c, i) => `
                <div class="rev-card" id="card-${c.t.replace(/\s+/g, '-')}">
                    <div class="card-inner">
                        <div class="badge-group">
                            <span class="badge">${c.c}</span>
                            <span class="badge diff">${c.f}% Frequency</span>
                        </div>
                        <div class="title">${c.t}</div>
                        <div class="question">${c.q || 'Problem logic details...'}</div>
                        
                        <div class="reveal-section topic" onclick="this.classList.toggle('active')">
                            <div class="reveal-label">DOMAIN <span>VIEW</span></div>
                            <div class="reveal-content" style="font-weight: 700; color: #fff;">${c.tp || 'Arrays & Strings'}</div>
                        </div>

                        <div class="reveal-section" onclick="this.classList.toggle('active')">
                            <div class="reveal-label">OPTIMAL STRATEGY <span>REVEAL</span></div>
                            <div class="reveal-content">${c.optimal || 'No data.'}</div>
                        </div>

                        <div class="reveal-section" onclick="this.classList.toggle('active')">
                            <div class="reveal-label">INTERVIEW FOLLOW-UP <span>REVEAL</span></div>
                            <div class="reveal-content">${c.followup || 'No data.'}</div>
                        </div>

                        <button class="solved-btn ${state.solved[c.t] === 'solved' ? 'active' : ''}" 
                                onclick="toggleSolved('${c.t}', this)">
                            ${state.solved[c.t] === 'solved' ? 'MASTERED' : 'MARK AS MASTERED'}
                        </button>
                    </div>
                    ${i < filtered.length - 1 ? '<div class="scroll-hint">Swipe up for next card ▾</div>' : ''}
                </div>
            `).join('');

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">No matching cards found.</div>';
            }

            updateStats();
            updateProgress();
        }

        function jumpTo(title) {
            toggleSidebar();
            const el = document.getElementById(`card-${title.replace(/\s+/g, '-')}`);
            if (el) el.scrollIntoView({ behavior: 'auto', block: 'start' });
        }

        function toggleSolved(title, btn) {
            if (state.solved[title] === 'solved') {
                delete state.solved[title];
                btn.classList.remove('active');
                btn.textContent = 'MARK AS MASTERED';
            } else {
                state.solved[title] = 'solved';
                btn.classList.add('active');
                btn.textContent = 'MASTERED';
            }
            localStorage.setItem('prepState', JSON.stringify(state));
            updateStats();
        }

        function updateStats() {
            const solvedCount = REVISION_CARDS.filter(c => state.solved[c.t] === 'solved').length;
            document.getElementById('stats').textContent = `${solvedCount}/${REVISION_CARDS.length}`;
        }

        function updateProgress() {
            const currentScroll = container.scrollTop;
            const totalScroll = container.scrollHeight - container.clientHeight;
            const progress = (currentScroll / totalScroll) * 100;
            progressFill.style.width = (progress || 0) + '%';
        }

        container.onscroll = updateProgress;

        // Event Listeners
        document.getElementById('compFilter').onchange = (e) => { currentFilter = e.target.value; render(); };
        document.getElementById('sortOrder').onchange = (e) => { currentSort = e.target.value; render(); };
        document.getElementById('search').oninput = (e) => { searchQuery = e.target.value; render(); };

        render();
    </script>
</body>
</html>
